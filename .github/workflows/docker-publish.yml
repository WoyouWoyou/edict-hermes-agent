name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image name, for example ghcr.io/owner/edict-hermes-agent"
        required: true
      tag:
        description: "Image tag"
        required: false
        default: latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.event.inputs.image, 'ghcr.io/')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: edict/Dockerfile
          push: true
          tags: ${{ github.event.inputs.image }}:${{ github.event.inputs.tag }}
          build-contexts: |
            hermes_agent=https://github.com/NousResearch/hermes-agent.git
